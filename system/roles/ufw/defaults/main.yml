---
ufw_packages:
  - ufw

ufw_default_incoming: deny
ufw_default_outgoing: allow

ufw_use_ufw_docker: false
ufw_docker_ufw_version: "251123"
ufw_docker_ufw_url: "https://raw.githubusercontent.com/chaifeng/ufw-docker/{{ ufw_docker_ufw_version }}/ufw-docker"
ufw_docker_ufw_download_path: "/usr/local/bin/ufw-docker-{{ ufw_docker_ufw_version }}"
ufw_docker_ufw_path: /usr/local/bin/ufw-docker

ufw_docker_ufw_changed_files:
  - /etc/ufw/after.rules
  - /etc/ufw/after6.rules
ufw_docker_ufw_comment: "# Generated by ufw-docker version {{ ufw_docker_ufw_version }}"
ufw_docker_ufw_checksum: "sha256:c3e5f0bf6061a3a2e7d7ac06abc80665707d2f4c91e90d76f22e4168863fb472"
