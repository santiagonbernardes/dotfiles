---
- name: Start/enable user services
  ansible.builtin.service:
    name: "{{ desktop_user_services }}"
    state: started
    enabled: true
    scope: user
  listen: configure services

- name: Start/enable system services
  ansible.builtin.service:
    name: "{{ desktop_system_services }}"
    state: started
    enabled: true
  become: true
  listen: configure services
