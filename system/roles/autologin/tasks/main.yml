---
- name: Ensure directory exists
  ansible.builtin.file:
    state: directory
    path: "{{ autologin_base_dir }}"
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Copy autologin configuration file
  ansible.builtin.template:
    src: autologin.conf.j2
    dest: "{{ autologin_base_dir }}/autologin.conf"
    owner: root
    group: root
    mode: "0644"
  become: true
