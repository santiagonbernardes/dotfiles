---
- name: Install drivers
  ansible.builtin.package:
    name: "{{ bluetooth_packages }}"
    state: present
  become: true

- name: Loads the btusb module and persist its configuration
  community.general.modprobe:
    name: btusb
    state: present
    persistent: present
  become: true

- name: Make sure bluetooth service is running and enabled
  ansible.builtin.service:
    name: bluetooth
    state: started
    enabled: true
  become: true
