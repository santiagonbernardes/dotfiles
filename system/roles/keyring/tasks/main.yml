---
- name: Install drivers
  ansible.builtin.package:
    name: "{{ audio_packages }}"
    state: present
  become: true

- name: Ensures keyrings directory exists
  ansible.builtin.file:
    path: "{{ keyring_dir }}"
    state: directory
    mode: "0700"
  become: false

- name: Copies default file
  ansible.builtin.copy:
    src: "default"
    dest: "{{ keyring_dir }}/default"
    force: false
    mode: "0644"
  become: false

- name: Copies default keyring template
  ansible.builtin.template:
    src: "Default_keyring.keyring.j2"
    dest: "{{ keyring_dir }}/Default_keyring.keyring"
    force: false
    mode: "0644"
  become: false
