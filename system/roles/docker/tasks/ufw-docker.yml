---
- name: Download ufw-docker
  ansible.builtin.get_url:
    url: "{{ docker_ufw_url }}"
    dest: "{{ docker_ufw_download_path }}"
    mode: "0755"
    force: false
  become: true

- name: Check if comment exists
  ansible.builtin.command:
    cmd: "grep -Fxq {{ docker_ufw_comment | quote }} {{ item }}"
  loop: "{{ docker_ufw_changed_files }}"
  register: docker_ufw_comment_check
  changed_when: false
  failed_when: false

- name: Run ufw-docker installation
  when: >
    docker_ufw_comment_check.results
    | selectattr('rc', 'ne', 0)
    | list
    | length > 0
  block:
    - name: Install ufw-docker
      ansible.builtin.command:
        cmd: "{{ docker_ufw_download_path }} install --system"
      changed_when: false
      become: true

    - name: Append comment
      ansible.builtin.lineinfile:
        path: "{{ item }}"
        line: "{{ docker_ufw_comment }}"
        insertafter: EOF
      loop: "{{ docker_ufw_changed_files }}"
      become: true

    - name: Restarts ufw
      ansible.builtin.service:
        name: ufw
        state: restarted
      become: true
