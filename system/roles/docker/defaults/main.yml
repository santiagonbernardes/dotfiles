---
docker_packages:
  - docker
  - docker-buildx
  - docker-compose
  - nvidia-container-toolkit
  - lazydocker

docker_ufw_version: "251123"
docker_ufw_url: "https://raw.githubusercontent.com/chaifeng/ufw-docker/{{ docker_ufw_version }}/ufw-docker"
docker_ufw_download_path: "/usr/local/bin/ufw-docker-{{ docker_ufw_version }}"
docker_ufw_path: /usr/local/bin/ufw-docker
docker_ufw_comment: "# Generated by ufw-docker version {{ docker_ufw_version }}"

docker_ufw_changed_files:
  - /etc/ufw/after.rules
  - /etc/ufw/after6.rules
