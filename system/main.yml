# vim:set ft=yaml.ansible:

---
- name: Sets up workstation
  hosts: workstation

  pre_tasks:
    - name: Refresh package manager cache
      ansible.builtin.package:
        update_cache: true
      become: true

  roles:
    - base
    - vconsole
    - localization
    - initramfs
    - bootloader
    - autologin
    - gpu
    - audio
    - bluetooth
    - ufw
    - docker
    - git
    - hardware
    - mise
    - ai
    - desktop
