---
- name: Get repository SSH URL
  ansible.builtin.command:
    cmd: >
      gh repo view {{ dev_repo_name }}
      --json sshUrl
      --jq .sshUrl
  register: dev_ssh_url
  changed_when: false

- name: Ensure SSH origin
  community.general.git_config:
    repo: "{{ ansible_facts['playbook_dir'] }}"
    name: remote.origin.url
    value: "{{ dev_ssh_url }} | trim"
