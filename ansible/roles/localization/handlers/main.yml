---
- name: Generates localization
  ansible.builtin.command:
    cmd: locale-gen
  register: localization_output
  changed_when: localization_output.rc != 0
  listen: generates localization
  become: true

- name: Restart locale
  ansible.builtin.service:
    name: systemd-localed
    state: restarted
  listen: restart locale
  become: true
